<!DOCTYPE html>
<html>
<head>
    <title>PacketGuard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #100D08;
            --panel: rgba(28,22,14,0.94);
            --panel-border: rgba(212,164,78,0.28);
            --gold: #D4A24E;
            --gold-bright: #F5D485;
            --gold-dim: #A9843F;
            --ink: #FDF6E8;
            --ink-dim: #C4B08A;
            --ink-faint: #8F7C58;
        }
        html, body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--ink);
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(212,164,78,0.07) 1px, transparent 1px);
            background-size: 22px 22px;
            pointer-events: none;
            z-index: 1;
        }
        body {
            padding: 56px 20px;
            display: flex;
            justify-content: center;
        }
        .wrap { width: 100%; max-width: 720px; position: relative; z-index: 2; }

        .hero-logo {
            margin: 0 auto 18px;
            display: flex;
            justify-content: center;
        }
        .hero-logo svg {
            filter: drop-shadow(0 0 10px rgba(212,164,78,0.45));
        }

        .intro-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            animation: introHide 1.4s ease forwards;
        }
        .intro-logo-wrap { position: relative; width: 140px; height: 140px; }
        .intro-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 1px solid rgba(212,164,78,0.35);
            animation: ringPulse 1.4s ease-out forwards;
        }
        .intro-logo {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 22px rgba(212,164,78,0.55));
            animation: logoPop 1.05s cubic-bezier(.34,1.56,.64,1) forwards;
        }
        .intro-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 1px;
            color: var(--gold-dim); margin-top: 16px; opacity: 0;
            animation: tagFade 1.4s ease forwards;
        }
        @keyframes tagFade {
            0%, 28% { opacity: 0; transform: translateY(4px); }
            48%, 76% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; }
        }
        @keyframes logoPop {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.15); opacity: 1; }
            70% { transform: scale(0.97); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes ringPulse {
            0% { transform: scale(0.6); opacity: 0; }
            45% { transform: scale(1.4); opacity: 0.7; }
            100% { transform: scale(2.1); opacity: 0; }
        }
        @keyframes introHide {
            0%, 52% { opacity: 1; pointer-events: all; }
            100% { opacity: 0; pointer-events: none; visibility: hidden; }
        }
        @keyframes popJump {
            0% { opacity: 0; transform: translateY(36px) scale(0.9) rotate(var(--r, 0deg)); }
            55% { opacity: 1; transform: translateY(-8px) scale(1.03) rotate(var(--r, 0deg)); }
            75% { transform: translateY(3px) scale(0.99) rotate(var(--r, 0deg)); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotate(var(--r, 0deg)); }
        }
        .pop { opacity: 0; animation: popJump 0.7s cubic-bezier(.34,1.56,.64,1) forwards; }
        .upload-card.pop:nth-of-type(1) { animation-delay: 1.4s; }
        .upload-card.pop:nth-of-type(2) { animation-delay: 1.5s; }
        .upload-card.pop:nth-of-type(3) { animation-delay: 1.6s; }

        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-dim);
            text-align: center;
            margin: 0 0 8px;
        }
        .eyebrow::before { content: "// "; }
        .eyebrow::after { content: " //"; }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 38px;
            text-align: center;
            margin: 0 0 8px;
            letter-spacing: -0.5px;
            color: var(--ink);
        }
        h1 span { color: var(--gold-bright); font-style: italic; }

        .cursor {
            display: inline-block;
            width: 9px;
            height: 26px;
            background: var(--gold-bright);
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1.1s steps(1) infinite;
            box-shadow: 0 0 8px var(--gold);
        }
        @keyframes blink { 50% { opacity: 0; } }

        .subhead {
            text-align: center;
            font-size: 15px;
            color: var(--ink-faint);
            margin: 0 0 32px;
        }

        .glass {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 24px -16px rgba(0,0,0,0.6);
        }

        .case-pin::before {
            content: ""; position: absolute; top: -5px; left: 20px;
            width: 8px; height: 8px; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold-dim));
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 3;
        }

        .upload-card {
            padding: 22px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
            transition: transform 0.2s ease;
        }
        .upload-card:nth-of-type(1) { transform: rotate(-0.5deg); }
        .upload-card:nth-of-type(2) { transform: rotate(0.4deg); }
        .upload-card:nth-of-type(3) { transform: rotate(-0.35deg); }
        .upload-card:hover { transform: rotate(0deg) !important; }
        input[type="file"] {
            flex: 1;
            min-width: 180px;
            font-family: inherit;
            font-size: 14px;
            color: var(--ink-dim);
            padding: 11px 14px;
            border-radius: 3px;
            border: 1px solid var(--panel-border);
            background: var(--bg);
        }
        button {
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
            background: var(--gold);
            color: #1A1206;
            border: none;
            padding: 12px 24px;
            border-radius: 3px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(212,164,78,0.25);
            transition: box-shadow 0.15s, transform 0.1s, background 0.15s;
        }
        button:hover { box-shadow: 0 8px 22px rgba(212,164,78,0.4); transform: translateY(-1px); background: var(--gold-bright); }
        button:active { transform: translateY(0); }
        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--gold-bright);
            border: 1px solid var(--panel-border);
            box-shadow: none;
        }
        .btn-secondary:hover { background: rgba(212,164,78,0.08); box-shadow: 0 0 14px rgba(212,164,78,0.15); background: rgba(212,164,78,0.08); }

        .scanbar {
            position: absolute;
            top: 0; left: -40%;
            width: 40%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
            animation: scan 1.4s linear infinite;
        }
        @keyframes scan { from { left: -40%; } to { left: 100%; } }

        .summary-card {
            padding: 26px 28px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 16px;
            transform: rotate(-0.3deg);
        }
        .summary-card.glow-clear { box-shadow: 0 0 0 1px rgba(122,180,120,0.25), 0 0 24px rgba(122,180,120,0.12); }
        .summary-card.glow-elevated { box-shadow: 0 0 0 1px rgba(217,164,65,0.28), 0 0 24px rgba(217,164,65,0.15); }
        .summary-card.glow-high { box-shadow: 0 0 0 1px rgba(214,100,80,0.32), 0 0 28px rgba(214,100,80,0.2); }

        .gauge-wrap { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
        .gauge-wrap svg { transform: rotate(-90deg); }
        .gauge-pct {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: 18px; color: var(--ink);
        }
        .gauge-status { font-weight: 700; font-size: 18px; margin: 0 0 3px; text-transform: uppercase; letter-spacing: 0.5px; }
        .gauge-detail { font-size: 14px; color: var(--ink-faint); margin: 0; }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .chart-card { padding: 20px; }
        .chart-card:nth-of-type(1) { transform: rotate(-0.4deg); }
        .chart-card:nth-of-type(2) { transform: rotate(0.4deg); }
        .chart-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin: 0 0 14px;
        }
        .chart-box { position: relative; height: 180px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }
        .cat-card { padding: 18px; position: relative; transition: transform 0.2s ease; }
        .cat-card:nth-child(5n+1) { transform: rotate(-0.6deg); }
        .cat-card:nth-child(5n+2) { transform: rotate(0.5deg); }
        .cat-card:nth-child(5n+3) { transform: rotate(-0.4deg); }
        .cat-card:nth-child(5n+4) { transform: rotate(0.6deg); }
        .cat-card:nth-child(5n+5) { transform: rotate(-0.3deg); }
        .cat-card:hover { transform: rotate(0deg) translateY(-2px) !important; }
        .icon-sq {
            width: 38px; height: 38px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .cat-name { font-weight: 600; font-size: 15px; margin: 0 0 2px; color: var(--ink); text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-count { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; margin: 0 0 10px; color: var(--ink); }
        .conf-label { font-size: 12px; color: var(--ink-faint); display: flex; justify-content: space-between; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .conf-track { height: 4px; border-radius: 999px; background: var(--bg); overflow: hidden; }
        .conf-fill { height: 100%; border-radius: 999px; }
        .severity {
            position: absolute; top: 16px; right: 16px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
            padding: 3px 8px; border-radius: 3px;
        }

        .cat-expand { margin-top: 12px; }
        .cat-expand summary {
            list-style: none; cursor: pointer; font-size: 12px; color: var(--gold-bright);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .cat-expand summary::-webkit-details-marker { display: none; }
        .cat-expand summary::before { content: "+ details"; }
        .cat-expand[open] summary::before { content: "– details"; }
        .cat-expand-body {
            font-size: 13px; color: var(--ink-dim); line-height: 1.65; margin-top: 8px;
            padding-top: 8px; border-top: 1px solid var(--panel-border);
        }

        .feat-row { margin-bottom: 12px; }
        .feat-label {
            display: flex; justify-content: space-between;
            font-size: 14px; color: var(--ink-dim); margin-bottom: 4px;
        }

        .placeholder {
            text-align: center;
            color: var(--ink-faint);
            font-size: 15px;
            padding: 44px 0;
            transform: rotate(0deg) !important;
        }
        .placeholder::before { content: "> "; color: var(--gold-bright); }
    </style>
</head>
<body>
<div class="intro-overlay">
    <div class="intro-logo-wrap">
        <div class="intro-ring"></div>
        <svg class="intro-logo" viewBox="0 0 24 24" fill="none" stroke="#D4A24E" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/>
            <circle cx="12" cy="10" r="1.4" fill="#D4A24E" stroke="none"/>
            <circle cx="9" cy="14.5" r="1" fill="#D4A24E" stroke="none"/>
            <circle cx="15" cy="14.5" r="1" fill="#D4A24E" stroke="none"/>
            <path d="M12 10L9 14.5M12 10L15 14.5" stroke-width="0.9"/>
        </svg>
    </div>
    <p class="intro-tag">booting the watchtower</p>
</div>
<div class="wrap">
    <nav style="max-width:720px; margin:0 auto 24px; display:flex; justify-content:space-between; align-items:center; font-size:13px; position:relative; z-index:2;">
    <a href="/" style="color:#F5D485; text-decoration:none; font-weight:600; font-family:'Fraunces',serif;">
        PacketGuard
    </a>
    <div style="display:flex; gap:20px;">
        <a href="/dashboard" style="color:#FDF6E8; text-decoration:none;">Dashboard</a>
        <a href="/compare" style="color:#C4B08A; text-decoration:none;">Compare</a>
        <a href="/about" style="color:#C4B08A; text-decoration:none;">About</a>
        <a href="/docs" style="color:#C4B08A; text-decoration:none;">Docs</a>
    </div>
</nav>
    <div class="hero-logo">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#D4A24E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/>
            <circle cx="12" cy="10" r="1.4" fill="#D4A24E" stroke="none"/>
            <circle cx="9" cy="14.5" r="1" fill="#D4A24E" stroke="none"/>
            <circle cx="15" cy="14.5" r="1" fill="#D4A24E" stroke="none"/>
            <path d="M12 10L9 14.5M12 10L15 14.5" stroke-width="0.9"/>
        </svg>
    </div>
    <p class="eyebrow">Network Intrusion Detection</p>
    <h1>Packet<span>Guard</span><span class="cursor"></span></h1>
    <p class="subhead">upload traffic, get a classified breakdown</p>

    <div class="upload-card glass case-pin pop">
        <input type="file" id="csvFile" accept=".csv,.txt">
        <button onclick="uploadFile()">Analyze Traffic</button>
    </div>

    <div class="upload-card glass case-pin pop" style="padding: 14px 24px;">
        <button class="btn-secondary" onclick="explainFile()">See What The Model Looks At</button>
    </div>

    <div class="upload-card glass case-pin pop" style="padding: 14px 24px;">
        <button class="btn-secondary" onclick="checkAnomalies()">Run Anomaly Detector</button>
    </div>

    <div id="output">
        <div class="glass placeholder">Upload a traffic file to see the breakdown</div>
    </div>

    <div id="explainOutput"></div>
    <div id="anomalyOutput"></div>
</div>

<script>
    let doughnutChart = null;
    let barChart = null;

    const categoryMeta = {
        "Normal": {
            color: "#7AB478", severity: "None", icon: "M6 12l4 4 8-8",
            detail: "No signs the model associates with an attack pattern — normal connection behavior for this traffic mix."
        },
        "DoS": {
            color: "#D66450", severity: "Medium", icon: "M12 3v10M12 17v.01M4 12a8 8 0 1116 0",
            detail: "Flagged mainly on volume — high connection counts and error rates consistent with flooding traffic aimed at a single target."
        },
        "Probe": {
            color: "#E0AE4A", severity: "Low", icon: "M12 3a9 9 0 100 18 9 9 0 000-18zM12 7v5l3 3",
            detail: "Looks like reconnaissance — scanning patterns across ports or hosts that typically precede a targeted attack."
        },
        "R2L": {
            color: "#D4A24E", severity: "High", icon: "M7 11V7a5 5 0 0110 0v4M5 11h14v9H5z",
            detail: "Remote-to-local access attempt. This is the category the model is weakest on — see the Compare page for why."
        },
        "U2R": {
            color: "#C2568C", severity: "Critical", icon: "M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z",
            detail: "Privilege escalation on a system already accessed — rare in the data, so treat any flag here as worth a manual look."
        }
    };

    async function uploadFile() {
        const fileInput = document.getElementById("csvFile");
        const file = fileInput.files[0];
        const output = document.getElementById("output");
        if (!file) {
            output.innerHTML = '<div class="glass placeholder">Choose a file first</div>';
            return;
        }

        output.innerHTML = '<div class="glass placeholder" style="position:relative;"><div class="scanbar"></div>Analyzing traffic...</div>';

        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch("/predict", { method: "POST", body: formData });
        const data = await response.json();

        if (data.error) {
            output.innerHTML = `<div class="glass placeholder">${data.error}</div>`;
            return;
        }

        renderResults(data.predictions, data.confidences || []);
    }

    async function explainFile() {
        const explainOutput = document.getElementById("explainOutput");
        explainOutput.innerHTML = '<div class="glass placeholder" style="position:relative;"><div class="scanbar"></div>Reading model weights...</div>';

        const response = await fetch("/explain");
        const data = await response.json();

        if (data.error) {
            explainOutput.innerHTML = `<div class="glass placeholder">${data.error}</div>`;
            return;
        }

        const maxImp = Math.max(...data.top_features.map(f => f.importance));
        const rows = data.top_features.map(f => {
            const pct = Math.round((f.importance / maxImp) * 100);
            const cleanName = f.feature.replace("num__", "").replace("cat__", "").replace(/_/g, " ");
            return `
                <div class="feat-row">
                    <div class="feat-label">
                        <span>${cleanName}</span>
                        <span>${(f.importance * 100).toFixed(1)}%</span>
                    </div>
                    <div class="conf-track"><div class="conf-fill" style="width:${pct}%; background:#D4A24E; box-shadow:0 0 8px rgba(212,164,78,0.55);"></div></div>
                </div>
            `;
        }).join("");

        explainOutput.innerHTML = `
            <div class="chart-card glass">
                <p class="chart-title">What This Model Relies On Most</p>
                ${rows}
            </div>
        `;
    }


    async function checkAnomalies() {
    const fileInput = document.getElementById("csvFile");
    const file = fileInput.files[0];
    const anomalyOutput = document.getElementById("anomalyOutput");
    if (!file) {
        anomalyOutput.innerHTML = '<div class="glass placeholder">Choose a file first</div>';
        return;
    }

    anomalyOutput.innerHTML = '<div class="glass placeholder" style="position:relative;"><div class="scanbar"></div>Running unsupervised anomaly scan...</div>';

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/anomaly-check", { method: "POST", body: formData });
    const data = await response.json();

    if (data.error) {
        anomalyOutput.innerHTML = `<div class="glass placeholder">${data.error}</div>`;
        return;
    }

    const pct = Math.round((data.anomalies_flagged / data.total) * 100);

    anomalyOutput.innerHTML = `
        <div class="chart-card glass">
            <p class="chart-title">Unsupervised Anomaly Scan (Isolation Forest)</p>
            <p style="font-size:15px; color:#DCC9A0; margin: 0 0 14px;">
                <strong style="color:#F5D485; font-size:22px; font-family:'JetBrains Mono',monospace;">${data.anomalies_flagged} / ${data.total}</strong>
                flows (${pct}%) flagged as statistically abnormal — independent of the category classifier above.
            </p>
            <p style="font-size:13px; color:#A9905F; line-height:1.65;">
                This model doesn't name an attack type — it only flags traffic that deviates from
                normal patterns, so it can catch novel attacks the classifier was never trained on,
                at the cost of not knowing exactly what kind of attack it is.
            </p>
        </div>
    `;
}

    function renderResults(predictions, confidences) {
        const total = predictions.length;
        const malicious = predictions.filter(p => p !== "Normal").length;
        const pct = total ? Math.round((malicious / total) * 100) : 0;

        let statusLabel, statusColor, glowClass;
        if (pct === 0) { statusLabel = "Clear"; statusColor = "#7AB478"; glowClass = "glow-clear"; }
        else if (pct < 40) { statusLabel = "Elevated"; statusColor = "#E0AE4A"; glowClass = "glow-elevated"; }
        else { statusLabel = "High Risk"; statusColor = "#D66450"; glowClass = "glow-high"; }

        const r = 36;
        const circumference = 2 * Math.PI * r;
        const offset = circumference - (pct / 100) * circumference;

        const counts = {};
        const confSums = {};
        predictions.forEach((p, i) => {
            counts[p] = (counts[p] || 0) + 1;
            confSums[p] = (confSums[p] || 0) + (confidences[i] !== undefined ? confidences[i] : 1);
        });

        const cardsHtml = Object.entries(counts).map(([cat, count], idx) => {
            const meta = categoryMeta[cat] || { color: "#A6926E", severity: "Unknown", icon: "M12 4v16", detail: "No further detail available for this category." };
            const avgConf = Math.round((confSums[cat] / count) * 100);
            return `
                <div class="cat-card glass pop" style="animation-delay:${idx * 0.08}s;">
                    ${meta.severity !== "None" ? `<span class="severity" style="background:${meta.color}22;color:${meta.color}">${meta.severity}</span>` : ""}
                    <div class="icon-sq" style="background:${meta.color}22">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${meta.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="${meta.icon}"/>
                        </svg>
                    </div>
                    <p class="cat-name">${cat}</p>
                    <p class="cat-count">${count}</p>
                    <div class="conf-label"><span>Confidence</span><span>${avgConf}%</span></div>
                    <div class="conf-track"><div class="conf-fill" style="width:${avgConf}%;background:${meta.color};box-shadow:0 0 8px ${meta.color}88;"></div></div>
                    <details class="cat-expand">
                        <summary></summary>
                        <div class="cat-expand-body">${meta.detail}</div>
                    </details>
                </div>
            `;
        }).join("");

        document.getElementById("output").innerHTML = `
            <div class="summary-card glass pop ${glowClass}">
                <div class="gauge-wrap">
                    <svg width="88" height="88" viewBox="0 0 88 88">
                        <circle cx="44" cy="44" r="${r}" fill="none" stroke="#241C10" stroke-width="8"/>
                        <circle cx="44" cy="44" r="${r}" fill="none" stroke="${statusColor}" stroke-width="8"
                            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"
                            style="filter: drop-shadow(0 0 6px ${statusColor});"/>
                    </svg>
                    <div class="gauge-pct">${pct}%</div>
                </div>
                <div>
                    <p class="gauge-status" style="color:${statusColor}">${statusLabel}</p>
                    <p class="gauge-detail">${malicious} of ${total} flows flagged as non-normal</p>
                </div>
            </div>

            <div class="charts-row">
                <div class="chart-card glass">
                    <p class="chart-title">Category Breakdown</p>
                    <div class="chart-box"><canvas id="doughnutChart"></canvas></div>
                </div>
                <div class="chart-card glass">
                    <p class="chart-title">Avg Confidence By Class</p>
                    <div class="chart-box"><canvas id="barChart"></canvas></div>
                </div>
            </div>

            <div class="grid">${cardsHtml}</div>
        `;

        const labels = Object.keys(counts);
        const values = Object.values(counts);
        const colors = labels.map(l => (categoryMeta[l] || {}).color || "#A6926E");
        const avgConfs = labels.map(l => Math.round((confSums[l] / counts[l]) * 100));

        if (doughnutChart) doughnutChart.destroy();
        if (barChart) barChart.destroy();

        doughnutChart = new Chart(document.getElementById("doughnutChart").getContext("2d"), {
            type: "doughnut",
            data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
            options: {
                plugins: { legend: { position: "bottom", labels: { font: { size: 12, family: "'Manrope'" }, color: "#DCC9A0", boxWidth: 8 } } }
            }
        });

        barChart = new Chart(document.getElementById("barChart").getContext("2d"), {
            type: "bar",
            data: { labels, datasets: [{ data: avgConfs, backgroundColor: colors, borderRadius: 3 }] },
            options: {
                indexAxis: "y",
                scales: {
                    x: { max: 100, grid: { color: "#241C10" }, ticks: { color: "#A9905F", font: { size: 11, family: "'Manrope'" } } },
                    y: { grid: { display: false }, ticks: { color: "#DCC9A0", font: { size: 12, family: "'Manrope'" } } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
